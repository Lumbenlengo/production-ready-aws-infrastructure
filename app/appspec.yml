version: 0.0
os: linux

files:
  - source: /
    destination: /opt/app

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: root

  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/health_check.sh
      timeout: 60
      runas: root
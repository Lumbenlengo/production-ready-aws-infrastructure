# app/appspec.yml
# CodeDeploy application specification for Blue/Green deployment

version: 0.0
os: linux

files:
  - source: /
    destination: /opt/app

hooks:
  BeforeInstall:
    - location: app/scripts/stop_server.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: app/scripts/start_server.sh
      timeout: 120
      runas: root

  ValidateService:
    - location: app/scripts/health_check.sh
      timeout: 60
      runas: root

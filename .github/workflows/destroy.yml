name: 'Destroy Infrastructure'

on:
  workflow_dispatch:          # ← Só executa quando TU clicares manualmente
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      confirmation:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

env:
  TF_VERSION: '1.5.0'
  AWS_REGION: 'us-east-1'
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_api_key: ${{ secrets.API_KEY }}

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: 'Destroy ${{ github.event.inputs.environment }}'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsDestroy

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Terraform Plan Destroy
        id: plan
        run: |
          terraform plan -destroy -no-color \
            -var-file="environments/${{ github.event.inputs.environment }}/terraform.tfvars" \
            -out=destroy.tfplan

      - name: Confirm Destroy
        if: github.event.inputs.confirmation != 'DESTROY'
        run: |
          echo "❌ Confirmation failed. You must type DESTROY to proceed."
          exit 1

      - name: Terraform Destroy
        if: github.event.inputs.confirmation == 'DESTROY'
        run: terraform apply destroy.tfplan
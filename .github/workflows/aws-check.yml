name: AWS & Terraform Check

on:
  pull_request:
    branches: [develop, main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-check:
    name: Validate & Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            terraform init -backend-config="key=staging/terraform.tfstate"
          else
            terraform init -backend-config="key=dev/terraform.tfstate"
          fi

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_api_key: ${{ secrets.API_KEY }}
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            terraform plan -no-color -var-file="environments/staging/terraform.tfvars"
          else
            terraform plan -no-color -var-file="environments/dev/terraform.tfvars"
          fi

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: always()
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN || '(no plan output captured)';
            const output = `#### Terraform Plan — \`${{ github.base_ref }}\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

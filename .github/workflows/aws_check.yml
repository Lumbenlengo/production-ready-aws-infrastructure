name: Terraform Infrastructure Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform-check:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest

    # Secrets are injected as TF_VAR_ env vars so Terraform picks them up
    # automatically without any -var flags on the command line.
    # Make sure these secrets exist in GitHub: Settings → Secrets → Actions
    #   DB_PASSWORD  — at least 16 characters
    #   API_KEY      — any non-empty string
    #   AWS_ROLE_ARN — full ARN of the OIDC role
    env:
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_api_key: ${{ secrets.API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Prints the directory tree so you can confirm all expected files exist.
      # Remove this step once the pipeline is stable.
      - name: Debug — show repo structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== Environments ==="
          ls -la environments/ || echo "environments/ directory not found"
          echo "=== Dev tfvars ==="
          cat environments/dev/terraform.tfvars || echo "terraform.tfvars not found"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.3'
          # false = raw Terraform output, required for capturing plan stdout
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend-config="key=dev/terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -var-file="environments/dev/terraform.tfvars"

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = process.env.PLAN || '(no plan output captured)';
            const output = `#### Terraform Plan
            <details><summary>Show Plan</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
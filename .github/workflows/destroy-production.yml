name: Destroy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY-PROD" to confirm'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    name: Terraform Destroy Production
    runs-on: ubuntu-latest
    environment: production 
    steps:
      - name: Abort if not confirmed
        if: github.event.inputs.confirm != 'DESTROY-PROD'
        run: |
          echo "Confirmation failed. Aborting."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"
          terraform_wrapper: false

      - name: Terraform Init
       
        run: terraform init -backend-config=environments/prod/backend.hcl

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var-file="environments/prod/terraform.tfvars"